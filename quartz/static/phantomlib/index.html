<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>phantomlib</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="card card-title">
      <h1 class="highlight">PHANTOMLIB</h1>
      <p>Numerical MRI phantom library with voxelized tissue models</p>
      <div class="tags">
        <span class="tag">Language: <a href="https://rust-lang.org/">Rust</a></span>
        <span class="tag">Machines: <a href="https://fly.io/docs/about/pricing/#started-fly-machines">shared-4x-cpu@8192MB</a></span>
        <span class="tag">Regions: <a href="https://fly.io/docs/reference/regions/">fra</a></span>
        <span class="tag">Dashboard: <a href="https://fly.io/apps/tool-phantomlib">fly.io/apps/tool-phantomlib</a></span>
      </div>
    </div>
    <div class="card">
      <h2>PHANTOMS</h2>
      <div class="card-actions">
        <div class="btn-well"><button class="btn" id="btnRefresh">Refresh</button></div>
        <input type="file" id="archiveFile" accept=".tar,.tar.gz,.tgz,.zip" hidden>
        <div class="btn-well"><button class="btn" onclick="document.getElementById('archiveFile').click()">Select [.tar(.gz), .zip]</button></div>
        <span class="file-label" id="fileLabel">no archive selected</span>
        <div class="spacer"></div>
        <div class="btn-well"><button class="btn btn-accent" id="btnUpload" disabled>Upload</button></div>
      </div>
    </div>
    <div class="card">
      <h2>OUTPUT</h2>
      <pre class="console output-console" id="console-output"></pre>
    </div>
  </div>
  <div class="viewer-overlay" id="viewerOverlay">
    <div class="viewer-pane card">
      <div class="viewer-header">
        <div class="viewer-header-left">
          <h2>VIEWER</h2>
          <span class="viewer-subtitle" id="viewerSubtitle"></span>
        </div>
        <div class="btn-well viewer-btn-well"><button class="btn viewer-btn" id="viewerClose"></button></div>
      </div>
      <pre class="console viewer-console" id="viewerContent"></pre>
    </div>
  </div>
  <script src="visuals.js"></script>
  <script type="module" src="pipeline.js"></script>
</body>

</html>
