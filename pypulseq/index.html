<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPulseq web</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.0/full/pyodide.js"></script>
    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <style>
        :root {
            --bg: #0b1020;
            --panel: #111a33;
            --text: #e8ecff;
            --muted: #a9b3da;
            --border: rgba(255, 255, 255, 0.12);
            --accent: #3b82f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        }
        body {
            padding: 0.5rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--panel);
            border-radius: 10px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .header {
            background: var(--panel);
            color: var(--text);
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.25rem;
            color: var(--accent);
        }
        .header p {
            color: var(--muted);
            font-size: 0.875rem;
        }
        .versions {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid var(--border);
            font-size: 0.7rem;
            color: var(--muted);
        }
        .versions span {
            margin-right: 0.75rem;
        }
        .content {
            padding: 1rem;
        }
        .status-box {
            padding: 0.75rem;
            background: rgba(59, 130, 246, 0.1);
            border-left: 4px solid var(--accent);
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 1rem;
        }
        @media (max-width: 1024px) {
            .grid { grid-template-columns: 1fr; }
        }
        .full-width {
            grid-column: 1 / -1;
        }
        .panel {
            background: var(--panel);
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .panel h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 14px;
        }
        .controls {
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        .controls-table {
            width: 100%;
            border-collapse: collapse;
        }
        .controls-table td {
            padding: 0.1rem 0.25rem;
            vertical-align: middle;
        }
        .controls-table td:first-child {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: 100px;
        }
        .controls-table td:nth-child(2) {
            width: auto;
            min-width: 100px;
        }
        .controls-table td:last-child {
            width: 60px;
            text-align: right;
        }
        .type-tag {
            font-size: 0.7rem;
            background: rgba(255, 255, 255, 0.08);
            color: var(--muted);
            padding: 0.1rem 0.3rem;
            border-radius: 4px;
            white-space: nowrap;
            border: 1px solid var(--border);
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            min-width: 100px;
            padding: 0.15rem 0.3rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
        }
        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        .toggle {
            position: relative;
            display: inline-flex;
            align-items: center;
            cursor: pointer;
        }
        .toggle input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            width: 2.25rem;
            height: 1.25rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 9999px;
            position: relative;
            transition: background 0.2s;
        }
        .toggle input:checked + .toggle-slider {
            background: var(--accent);
        }
        .toggle-slider::after {
            content: '';
            position: absolute;
            width: 1rem;
            height: 1rem;
            background: white;
            border-radius: 50%;
            top: 0.125rem;
            left: 0.125rem;
            transition: transform 0.2s;
        }
        .toggle input:checked + .toggle-slider::after {
            transform: translateX(1rem);
        }
        .button {
            width: 100%;
            max-width: 200px;
            background: var(--accent);
            color: white;
            font-weight: bold;
            padding: 0.5rem 1rem;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.875rem;
        }
        .button:hover:not(:disabled) {
            background: #2563eb;
        }
        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .button-hint {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 0.4rem;
            text-align: center;
        }
        .console {
            padding: 0.75rem;
            background: #111827;
            color: #4ade80;
            font-family: monospace;
            font-size: 0.7rem;
            border-radius: 0.375rem;
            overflow-x: auto;
            white-space: pre-wrap;
            height: 10rem;
            overflow-y: auto;
            border: 1px solid #1f2937;
        }
        .console .timestamp { color: var(--muted); }
        .console .error { color: #f87171; }
        .console .warn { color: #fbbf24; }
        .console .info { color: #4ade80; }
        #plot-output {
            width: 100%;
            margin-top: 1rem;
        }
        .mpl-figure-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            min-height: 100px;
            border: 1px dashed var(--border);
            border-radius: 10px;
            padding: 0.25rem;
            background: rgba(255, 255, 255, 0.04);
        }
        /* Style the figure containers generated by matplotlib */
        .mpl-figure-container > div {
            border: 1px solid var(--border) !important;
            border-radius: 10px !important;
            padding: 0 !important;
            background: var(--panel) !important;
            box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.3) !important;
            position: relative !important;
            display: block !important;
            width: 100% !important;
            max-width: 1000px !important;
            margin: 0 0 0.5rem 0 !important;
            overflow: hidden;
        }
        #plot-output canvas {
            display: block;
            max-width: 100%;
            height: auto !important;
            border-radius: 0;
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 14px;
        }
        .section-title svg {
            width: 1.1rem;
            height: 1.1rem;
            margin-right: 0.4rem;
        }
        .divider {
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 2s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #plot-output * {
            visibility: visible !important;
            pointer-events: auto !important;
        }
        /* Hide the figure titles and title bars */
        #plot-output .ui-dialog-titlebar {
            display: none !important;
        }
        /* Scale down the entire toolbar area and its contents by ~20% */
        #plot-output .mpl-toolbar, 
        #plot-output div[id$="top"] {
            display: flex !important;
            flex-wrap: wrap;
            gap: 3px;
            margin-bottom: 0;
            background: rgba(255, 255, 255, 0.06);
            padding: 3px;
            border-bottom: 1px solid var(--border);
            border-radius: 0;
            min-height: 24px;
        }
        #plot-output .mpl-toolbar button,
        #plot-output div[id$="top"] button,
        #plot-output .mpl-widget {
            padding: 2px 6px;
            background: var(--accent);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            line-height: 1.2;
            color: var(--text);
            transition: all 0.2s ease;
            opacity: 1;
        }
        #plot-output .mpl-toolbar button:hover,
        #plot-output div[id$="top"] button:hover,
        #plot-output .mpl-widget:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--accent);
            color: white;
        }
        #plot-output .mpl-toolbar button:active,
        #plot-output div[id$="top"] button:active,
        #plot-output .mpl-widget:active,
        #plot-output .mpl-toolbar button.mpl-active,
        #plot-output div[id$="top"] button.mpl-active,
        #plot-output .mpl-widget.mpl-active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        /* Style select dropdowns if they appear in the toolbar */
        #plot-output .mpl-toolbar select,
        #plot-output div[id$="top"] select {
            font-size: 10px !important;
            padding: 0 3px !important;
            height: 20px !important;
        }
        /* Handle any images/icons in the toolbar */
        #plot-output .mpl-toolbar img,
        #plot-output div[id$="top"] img {
            width: 15px !important;
            height: 15px !important;
        }
        /* Tighten up the coordinate display area */
        #plot-output div[id$="message"] {
            font-size: 10px !important;
            padding: 2px 6px !important;
            min-height: 1rem !important;
            background: rgba(255, 255, 255, 0.04);
            border-top: 1px solid var(--border);
            color: var(--text);
        }
        #plot-output div[id$="top"] button:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        /* Code Editor Modal */
        .editor-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .editor-modal.active {
            display: flex;
        }
        .editor-container {
            background: var(--panel);
            border-radius: 10px;
            width: 90%;
            max-width: 1000px;
            height: 85%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
        }
        .editor-header {
            padding: 1rem;
            background: var(--panel);
            color: var(--text);
            border-radius: 10px 10px 0 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .editor-header h3 {
            margin: 0;
            font-size: 1.1rem;
        }
        .editor-actions {
            display: flex;
            gap: 0.5rem;
        }
        .editor-btn {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .editor-btn-primary {
            background: var(--accent);
            color: white;
            border: 1px solid rgba(0, 0, 0, 0.15);
        }
        .editor-btn-primary:hover {
            background: #2563eb;
        }
        .editor-btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .editor-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .editor-body {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .CodeMirror {
            height: 100%;
            font-size: 14px;
        }
        .edit-code-btn {
            width: 100%;
            max-width: 200px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            margin-top: 0.5rem;
        }
        .edit-code-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PyPulseq web</h1>
        </div>

        
        <div class="content">
            <div id="status-container" class="status-box">
                <div style="display: flex; align-items: center;">
                    <div id="loader" class="loader" style="margin-right: 0.5rem;"></div>
                    <span id="status" style="color: var(--text); font-weight: 500; font-size: 0.875rem;">Initializing Pyodide...</span>
                </div>
                <div id="version-info" style="font-size: 0.7rem; color: var(--muted);">Pyodide loading...</div>
            </div>

            <div class="grid">
                <div class="panel">
                    <h2 class="section-title">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                        Parameters
                    </h2>
                    <div id="controls" class="controls">
                        <!-- Dynamic controls will be inserted here -->
                    </div>
                    <div class="divider">
                        <label style="display: flex; align-items: center; margin-bottom: 0.75rem; cursor: pointer; font-size: 0.875rem; color: var(--text);">
                            <input type="checkbox" id="dark-plot-checkbox" checked style="margin-right: 0.5rem; cursor: pointer; width: 1rem; height: 1rem;">
                            <span>Dark seq plot</span>
                        </label>
                        <button id="run-btn" class="button" disabled>Generate Sequence</button>

                        <button id="edit-code-btn" class="edit-code-btn" style="display: none;">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 1rem; height: 1rem; display: inline-block; vertical-align: middle; margin-right: 0.25rem;">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                            </svg>
                            Edit Code
                        </button>
                    </div>
                </div>
                
                <div>
                    <h2 class="section-title">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        Sequence Plot
                    </h2>
                    <div id="plot-output"></div>
                </div>

                <div class="full-width" style="margin-top: 0.5rem;">
                    <h2 class="section-title">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        Console Output
                    </h2>
                    <div id="console-output" class="console"></div>
                    <div id="plot-message" style="display: none;"></div>
                    <div id="package-versions" class="versions">
                        <span><strong>Pyodide:</strong> <span id="pyodide-version">loading...</span></span>
                        <span><strong>NumPy:</strong> <span id="numpy-version">loading...</span></span>
                        <span><strong>Matplotlib:</strong> <span id="matplotlib-version">loading...</span></span>
                        <span><strong>PyPulseq:</strong> <span id="pypulseq-version">loading...</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Code Editor Modal -->
    <div id="editor-modal" class="editor-modal">
        <div class="editor-container">
            <div class="editor-header">
                <h3>Edit Python Code (mr0_rare_2d_seq.py)</h3>
                <div class="editor-actions">
                    <button id="load-default-btn" class="editor-btn editor-btn-secondary">Load Default</button>
                    <button id="save-code-btn" class="editor-btn editor-btn-primary">Save and Close</button>
                    <button id="close-editor-btn" class="editor-btn editor-btn-secondary">Discard and Close</button>
                </div>
            </div>
            <div class="editor-body">
                <textarea id="code-editor"></textarea>
            </div>
        </div>
    </div>

    <script type="module">
        let pyodide;
        let seq_RARE_2D_params = [];
        let currentCode = ''; // Store the current Python code
        let defaultCode = ''; // Store the default/original Python code
        let codeEditor = null; // CodeMirror editor instance

        const statusEl = document.getElementById('status');
        const loaderEl = document.getElementById('loader');
        const statusContainer = document.getElementById('status-container');
        const controlsEl = document.getElementById('controls');
        const runBtn = document.getElementById('run-btn');
        const consoleEl = document.getElementById('console-output');
        const plotOutput = document.getElementById('plot-output');
        const plotMessage = document.getElementById('plot-message');
        const darkPlotCheckbox = document.getElementById('dark-plot-checkbox');
        const editCodeBtn = document.getElementById('edit-code-btn');
        const editorModal = document.getElementById('editor-modal');
        const saveCodeBtn = document.getElementById('save-code-btn');
        const closeEditorBtn = document.getElementById('close-editor-btn');
        const loadDefaultBtn = document.getElementById('load-default-btn');
        const codeEditorTextarea = document.getElementById('code-editor');

        // Mutation Observer to catch "ufo" divs (matplotlib figures) appended to body
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                mutation.addedNodes.forEach((node) => {
                    if (node.nodeType === 1) { // Element
                        const container = document.getElementById('mpl-actual-target');
                        if (!container) return;

                        // Check if this node or any of its children is a matplotlib canvas
                        const isMpl = node.querySelector('canvas') || node.classList.contains('ui-dialog') || (node.id && node.id.startsWith('matplotlib_'));
                        
                        if (isMpl && !container.contains(node)) {
                            console.log('Observer: Caught a "ufo" matplotlib element, moving to target area.');
                            container.appendChild(node);
                            
                            // Hide the "No plots generated" message
                            const loadingMsg = container.querySelector('p');
                            if (loadingMsg) loadingMsg.remove();
                        }
                    }
                });
            });
        });
        observer.observe(document.body, { childList: true, subtree: false });

        function log(msg, type = 'info') {
            const timestamp = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const colorClass = type === 'error' ? 'error' : (type === 'warn' ? 'warn' : 'info');
            consoleEl.innerHTML += `<div style="margin-bottom: 0.25rem;"><span class="timestamp">[${timestamp}]</span> <span class="${colorClass}">${msg}</span></div>`;
            consoleEl.scrollTop = consoleEl.scrollHeight;
            console.log(`[${type}] ${msg}`);
        }

        function getMatplotlibThemeCode() {
            const useDarkTheme = darkPlotCheckbox.checked;
            if (useDarkTheme) {
                return `
plt.rcParams.update({
    'figure.facecolor': '#111a33',  # Match --panel color
    'axes.facecolor': '#111a33',
    'axes.edgecolor': (1.0, 1.0, 1.0, 0.12),  # Match --border (rgba normalized to 0-1)
    'axes.labelcolor': '#e8ecff',  # Match --text
    'text.color': '#e8ecff',
    'xtick.color': '#a9b3da',  # Match --muted
    'ytick.color': '#a9b3da',
    'grid.color': (1.0, 1.0, 1.0, 0.12),  # Match --border (rgba normalized to 0-1)
    'figure.edgecolor': '#111a33',
    'savefig.facecolor': '#111a33',
    'savefig.edgecolor': '#111a33'
})`;
            } else {
                return `
# Reset to standard matplotlib theme
plt.rcdefaults()
plt.rcParams['figure.figsize'] = [8, 4]  # Keep figure size setting`;
            }
        }

        async function executeCode(code) {
            try {
                await pyodide.runPythonAsync(`
import sys
import traceback
import matplotlib.pyplot as plt
from types import ModuleType

# Mock MRzeroCore if pypulseq tries to import it
if 'MRzeroCore' not in sys.modules:
    mr0_mock = ModuleType('MRzeroCore')
    mr0_mock.util = ModuleType('MRzeroCore.util')
    sys.modules['MRzeroCore'] = mr0_mock
    sys.modules['MRzeroCore.util'] = mr0_mock.util

# Temporarily disable plotting during exec to prevent freezing
import pypulseq as pp
_orig_plot, _orig_show = pp.Sequence.plot, plt.show
pp.Sequence.plot = plt.show = lambda *args, **kwargs: None

try:
    exec(${JSON.stringify(code)}, sys.modules['__main__'].__dict__)
finally:
    pp.Sequence.plot, plt.show = _orig_plot, _orig_show
`);
            } catch (err) {
                log(`Python error: ${err.message}`, 'error');
                throw err;
            }
        }

        async function init() {
            try {
                log('Initializing... Please wait.');
                
                // Set the official Matplotlib target container before loading Pyodide
                // This is the standard way to direct plots to a specific element
                document.pyodideMplTarget = plotOutput;

                // Start fetching the script in parallel with Pyodide loading
                // Add cache-busting to ensure we get the latest file during development
                const scriptFetchPromise = fetch('mr0_rare_2d_seq.py?' + Date.now()).then(r => {
                    if (!r.ok) throw new Error('Failed to fetch mr0_rare_2d_seq.py');
                    return r.text();
                });

                log('Loading Pyodide runtime...');
                pyodide = await loadPyodide({
                    stdout: (text) => log(text),
                    stderr: (text) => log(text, 'error'),
                    // Enable IndexedDB caching for faster subsequent loads
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.29.0/full/"
                });
                
                statusEl.innerText = 'Installing packages...';
                log('Installing numpy, matplotlib, micropip...');
                // Load packages with caching enabled
                await pyodide.loadPackage(['numpy', 'matplotlib', 'micropip'], { checkIntegrity: false });
                
                statusEl.innerText = 'Installing pypulseq...';
                log('Installing pypulseq via micropip (this may take a minute)...');
                const micropip = pyodide.pyimport("micropip");
                await micropip.install('pypulseq');
                
                // Wait for script fetch to complete (if not already done)
                currentCode = await scriptFetchPromise;
                defaultCode = currentCode; // Store the original code as default
                
                // Combine environment setup, script execution, and version checking
                statusEl.innerText = 'Configuring environment...';
                log('Executing sequence script...');
                await executeCode(currentCode);
                
                // Get versions and configure matplotlib in one go
                statusEl.innerText = 'Finalizing setup...';
                const pyodideVersion = pyodide.version || 'unknown';
                const themeCode = getMatplotlibThemeCode();
                const [versions, paramsJson] = await Promise.all([
                    pyodide.runPythonAsync(`
import matplotlib
import matplotlib.pyplot as plt
import json
import sys

plt.ion()
${themeCode}
print(f"Backend: {matplotlib.get_backend()}")

versions = {}
versions['pyodide'] = ${JSON.stringify(pyodideVersion)}

try:
    import numpy
    versions['numpy'] = numpy.__version__
except:
    versions['numpy'] = 'unknown'

try:
    versions['matplotlib'] = matplotlib.__version__
except:
    versions['matplotlib'] = 'unknown'

try:
    import pypulseq
    versions['pypulseq'] = pypulseq.__version__
except:
    try:
        import pypulseq.version
        versions['pypulseq'] = pypulseq.version.__version__
    except:
        versions['pypulseq'] = 'unknown'

json.dumps(versions)
`),
                    pyodide.runPythonAsync(`
import inspect
import json
import numpy as np
import __main__

def get_params():
    func = __main__.seq_RARE_2D
    sig = inspect.signature(func)
    params = []
    for name, p in sig.parameters.items():
        if name == 'system': continue
        d = p.default
        val = d
        type_name = type(d).__name__
        if isinstance(d, np.ndarray):
            val = d.tolist()
        elif isinstance(d, (tuple, list)):
            val = list(d)
        elif d is inspect._empty:
            val = None
            type_name = 'None'
        params.append({'name': name, 'default': val, 'type': type_name})
    return json.dumps(params)

get_params()
`)
                ]);
                
                const versionData = JSON.parse(versions);
                const pyodideVer = versionData.pyodide || 'unknown';
                document.getElementById('pyodide-version').textContent = pyodideVer;
                document.getElementById('numpy-version').textContent = versionData.numpy || 'unknown';
                document.getElementById('matplotlib-version').textContent = versionData.matplotlib || 'unknown';
                document.getElementById('pypulseq-version').textContent = versionData.pypulseq || 'unknown';
                document.getElementById('version-info').textContent = `Pyodide v${pyodideVer}`;
                
                seq_RARE_2D_params = JSON.parse(paramsJson);
                renderControls(seq_RARE_2D_params);
                
                statusEl.innerText = 'Ready';
                loaderEl.style.display = 'none';
                runBtn.disabled = false;
                
                // Hide the status container once ready
                statusContainer.style.display = 'none';
                
                // Show the edit code button
                editCodeBtn.style.display = 'inline-block';
                
                // Initialize CodeMirror editor
                if (!codeEditor) {
                    codeEditor = CodeMirror.fromTextArea(codeEditorTextarea, {
                        lineNumbers: true,
                        mode: 'python',
                        theme: 'monokai',
                        indentUnit: 4,
                        indentWithTabs: false,
                        lineWrapping: true
                    });
                }
                codeEditor.setValue(currentCode);
                
                log('Initialization complete. Running initial sequence...');
                updateSequence();

            } catch (err) {
                statusEl.innerText = 'Initialization Error';
                statusEl.classList.add('text-red-600');
                loaderEl.style.display = 'none';
                log(`ERROR during init: ${err.message}`, 'error');
                console.error(err);
            }
        }

        function renderControls(params) {
            controlsEl.innerHTML = '';
            const table = document.createElement('table');
            table.className = 'controls-table';
            
            params.forEach(param => {
                const row = document.createElement('tr');
                
                // Label cell
                const labelCell = document.createElement('td');
                labelCell.textContent = param.name;
                row.appendChild(labelCell);
                
                // Input cell
                const inputCell = document.createElement('td');
                let input;
                if (param.type === 'bool') {
                    const toggleLabel = document.createElement('label');
                    toggleLabel.className = 'toggle';
                    input = document.createElement('input');
                    input.type = 'checkbox';
                    input.checked = param.default;
                    const toggleDiv = document.createElement('div');
                    toggleDiv.className = 'toggle-slider';
                    toggleLabel.appendChild(input);
                    toggleLabel.appendChild(toggleDiv);
                    inputCell.appendChild(toggleLabel);
                } else {
                    input = document.createElement('input');
                    if (param.type === 'int' || param.type === 'float') {
                        input.type = 'number';
                        input.step = param.type === 'int' ? '1' : 'any';
                        input.value = param.default;
                    } else if (Array.isArray(param.default)) {
                        input.type = 'text';
                        input.value = JSON.stringify(param.default);
                    } else {
                        input.type = 'text';
                        input.value = param.default === null ? '' : param.default;
                    }
                    inputCell.appendChild(input);
                }
                input.id = 'input-' + param.name;
                row.appendChild(inputCell);
                
                // Type tag cell
                const typeCell = document.createElement('td');
                const typeTag = document.createElement('span');
                typeTag.className = 'type-tag';
                typeTag.textContent = param.type;
                typeCell.appendChild(typeTag);
                row.appendChild(typeCell);
                
                table.appendChild(row);
            });
            
            controlsEl.appendChild(table);
        }

        async function updateSequence() {
            if (runBtn.disabled && statusEl.innerText === 'Generating sequence...') return;

            runBtn.disabled = true;
            statusEl.innerText = 'Generating sequence...';
            loaderEl.style.display = 'inline-block';
            
            try {
                let pyArgs = [];
                seq_RARE_2D_params.forEach(param => {
                    const input = document.getElementById('input-' + param.name);
                    if (!input) return;
                    let val;
                    if (param.type === 'bool') val = input.checked ? 'True' : 'False';
                    else if (param.type === 'int' || param.type === 'float') val = input.value || '0';
                    else if (param.type === 'list' || param.type === 'ndarray') val = `np.array(${input.value})`;
                    else if (param.type === 'str') val = `"${input.value}"`;
                    else val = input.value;
                    pyArgs.push(`${param.name}=${val}`);
                });

                log(`Updating sequence...`);
                
                // Cleanup: Remove all existing plots and containers
                plotOutput.innerHTML = '<div id="mpl-actual-target" class="mpl-figure-container"><p style="color: #6b7280; font-size: 0.875rem; text-align: center; margin-top: 2rem;">Generating plots...</p></div>';
                const container = document.getElementById('mpl-actual-target');

                // Redirect matplotlib to our new container
                // Set both the property and the global variable for maximum compatibility
                document.pyodideMplTarget = container;
                window.pyodideMplTarget = container;

                const themeCode = getMatplotlibThemeCode();
                const pythonCode = `
import matplotlib.pyplot as plt
import __main__
plt.close('all')
# Set a slightly smaller default figure size (scaled down by ~10-15%)
plt.rcParams['figure.figsize'] = [8, 4]
${themeCode}
# Run sequence generation
seq = __main__.seq_RARE_2D(${pyArgs.join(', ')})
# Prepare plot
seq.plot(plot_now=False)
# Display
plt.show()
"SUCCESS"
`;
                const result = await pyodide.runPythonAsync(pythonCode);

                // Clear the "Generating plots..." message if any figure appeared
                // or if the script finished
                setTimeout(() => {
                    const loadingMsg = container.querySelector('p');
                    
                    // Final sweep for any matplotlib divs
                    document.querySelectorAll('div.ui-dialog, div[id^="matplotlib_"], div:has(> canvas)').forEach(el => {
                        if (!container.contains(el) && el !== container) {
                            log(`Manual sweep: Found plot container outside target, moving it...`);
                            container.appendChild(el);
                        }
                    });

                    if (container.querySelector('canvas') && loadingMsg) {
                        loadingMsg.remove();
                    } else if (loadingMsg) {
                        loadingMsg.textContent = 'No plots generated.';
                    }
                }, 800);

                if (result.startsWith('ERROR:')) {
                    log(result, 'error');
                } else {
                    log(`Plots updated successfully.`);
                }
            } catch (err) {
                log('Error: ' + err.message, 'error');
            } finally {
                statusEl.innerText = 'Ready';
                loaderEl.style.display = 'none';
                runBtn.disabled = false;
            }
        }

        // Editor functionality
        editCodeBtn.addEventListener('click', () => {
            if (codeEditor) {
                codeEditor.setValue(currentCode);
                editorModal.classList.add('active');
                // Refresh CodeMirror to ensure proper sizing
                setTimeout(() => codeEditor.refresh(), 100);
            }
        });

        closeEditorBtn.addEventListener('click', () => {
            // Discard changes and close
            editorModal.classList.remove('active');
        });

        loadDefaultBtn.addEventListener('click', () => {
            if (codeEditor && defaultCode) {
                codeEditor.setValue(defaultCode);
            }
        });

        saveCodeBtn.addEventListener('click', async () => {
            const newCode = codeEditor.getValue();
            if (!newCode.trim()) return log('Error: Code is empty', 'error');

            saveCodeBtn.disabled = loadDefaultBtn.disabled = closeEditorBtn.disabled = true;
            statusEl.innerText = 'Reloading...';
            loaderEl.style.display = 'inline-block';
            runBtn.disabled = true;

            try {
                await executeCode(newCode);
                currentCode = newCode;
                
                const paramsJson = await pyodide.runPythonAsync(`
import inspect, json, numpy as np, __main__
def get_params():
    func = getattr(__main__, 'seq_RARE_2D', None)
    if not func: raise AttributeError("Function 'seq_RARE_2D' not found.")
    params = []
    for name, p in inspect.signature(func).parameters.items():
        if name == 'system': continue
        val = p.default
        if isinstance(val, np.ndarray): val = val.tolist()
        elif isinstance(val, (tuple, list)): val = list(val)
        params.append({'name': name, 'default': val, 'type': type(p.default).__name__})
    return json.dumps(params)
get_params()
`);
                
                seq_RARE_2D_params = JSON.parse(paramsJson);
                renderControls(seq_RARE_2D_params);
                
                editorModal.classList.remove('active');
                log('Code reloaded.');
                await updateSequence();
            } catch (err) {
                log(`Error: ${err.message}`, 'error');
            } finally {
                saveCodeBtn.disabled = loadDefaultBtn.disabled = closeEditorBtn.disabled = false;
                loaderEl.style.display = 'none';
                statusEl.innerText = 'Ready';
                runBtn.disabled = false;
            }
        });

        // Close modal when clicking outside
        editorModal.addEventListener('click', (e) => {
            if (e.target === editorModal) {
                editorModal.classList.remove('active');
            }
        });

        runBtn.addEventListener('click', updateSequence);
        window.addEventListener('load', init);
    </script>



</body>
</html>
